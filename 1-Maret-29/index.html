<!DOCTYPE html>
<html>
<body>

<h2>JavaScript let</h2>

<p>Redeclaring a variable with <b>let</b>, in another scope, or in another block, is allowed:</p>

<p id="demo"></p>

<script>
let x = 2;   // Allowed

{
  let x = 3;
  console.log("dalam block 1:", x);
}

{
  let x = 4;
  console.log("dalam block 2:", x);
}

console.log("luar block:", x);
document.getElementById("demo").innerHTML = x;
</script>

</body>
</html>
